<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>Controle de Estoque</title>
<link rel="stylesheet" href="globals.css">
<link rel="stylesheet" href="login.css">
</head>
<body>
<main class="element-login">
<section class="right-panel" aria-labelledby="page-title">
<div class="form-wrapper">
<form class="form-container" action="#" method="post">
<header class="frame">
<h1 class="welcome" id="page-title">Bem-vindo!</Bem-vindo!></h1>
<p class="welcome-sub"></p>
</header>
<div class="div">
<label class="email-label" for="email">E-Mail</label>
<input
            class="email-input"
            id="email"
            name="email"
            type="email"
            placeholder="@.com"
            autocomplete="email"
            inputmode="email"
            aria-required="true"
          />
</div>
<div class="frame-2">
<div class="div">
<label class="email-label" for="password">Senha</label>
<input
              class="placeholder-wrapper"
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              aria-required="true"
            />
</div>
<div class="group">
<input
              class="bottom-input"
              id="remember-me"
              name="remember-me"
              type="checkbox"
            />
<label class="remember-me" for="remember-me">Lembrar de mim</label>
<a class="forgot-password" href="#">Esqueceu a senha?</a>
</div>
</div>
<button class="login-button" type="submit">
<span class="button-text">Entrar</span>
</button>
</form>
</div>
</section>
</main>
</body>
</html>
